<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVI AI App</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .task { margin: 10px 0; }
        .priority { color: red; }
    </style>
</head>
<body>
    <h1>NAVI AI App</h1>
    <div>
        <input type="text" id="taskInput" placeholder="Enter your task..."><button id="addTask">Add Task</button>
    </div>
    <div id="taskList"></div>
    <script>
        const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');
        const addTaskButton = document.getElementById('addTask');

        function renderTasks() {
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const taskDiv = document.createElement('div');
                taskDiv.classList.add('task');
                taskDiv.innerHTML = `<span>${task.text} (Priority: <span class='priority'>${task.priority}</span>)</span> 
                <button onclick='editTask(${index})'>Edit</button> 
                <button onclick='deleteTask(${index})'>Delete</button>`;
                taskList.appendChild(taskDiv);
            });
        }

        function addTask() {
            const taskText = taskInput.value;
            const priority = prompt('Set Priority (1 to 5)') || 1;
            if (taskText) {
                tasks.push({ text: taskText, priority: priority });
                localStorage.setItem('tasks', JSON.stringify(tasks));
                taskInput.value = '';
                renderTasks();
            }
        }

        function editTask(index) {
            const updatedText = prompt('Update Task', tasks[index].text);
            if (updatedText) {
                tasks[index].text = updatedText;
                localStorage.setItem('tasks', JSON.stringify(tasks));
                renderTasks();
            }
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        }

        addTaskButton.onclick = addTask;

        // Initial rendering of tasks
        renderTasks();
    </script>
</body>
</html>
