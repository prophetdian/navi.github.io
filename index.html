<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVI AI App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .talk-to-navi, .task-builder { flex: 1; padding: 20px; }
        .talk-to-navi { background-color: #f0f0f0; }
        .task-builder { background-color: #e0e0e0; }
        h1 { margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="talk-to-navi">
            <h1>Talk to NAVI</h1>
            <p>Ask questions or give commands to NAVI:</p>
            <textarea id="user-input" rows="4" style="width: 100%;"></textarea>
            <button id="send-button">Send</button>
            <div id="navi-response"></div>
        </div>
        <div class="task-builder">
            <h1>Task Builder</h1>
            <p>Create tasks for NAVI:</p>
            <input type="text" id="task-input" placeholder="Enter your task" style="width: 100%;">
            <button id="add-task-button">Add Task</button>
            <ul id="task-list"></ul>
        </div>
    </div>
    <script>
        document.getElementById('send-button').onclick = function() {
            const userInput = document.getElementById('user-input').value;
            document.getElementById('navi-response').innerText = `NAVI says: ${userInput}`;
        };

        document.getElementById('add-task-button').onclick = function() {
            const taskInput = document.getElementById('task-input').value;
            const taskList = document.getElementById('task-list');
            const newTask = document.createElement('li');
            newTask.innerText = taskInput;
            taskList.appendChild(newTask);
            document.getElementById('task-input').value = '';
        };
    </script>
</body>
</html>
